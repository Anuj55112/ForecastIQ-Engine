model:
  default_type: "patchtst"
  patchtst:
    seq_len: 96
    pred_len: 24
    patch_len: 16
    stride: 8
    d_model: 128
    n_heads: 4
    d_ff: 256
    n_layers: 3
  nbeats:
    seq_len: 96
    pred_len: 24
    num_stacks: 4
    num_blocks: 3
    width: 128
  tft:
    seq_len: 96
    pred_len: 24
    hidden_size: 64
    num_heads: 4

training:
  epochs: 5
  batch_size: 16
  learning_rate: 0.001
  weight_decay: 0.0001
  mixed_precision: true
  checkpoint_dir: "checkpoints"
  wandb_logging: false
  wandb_project: "forecastiq"

api:
  host: "0.0.0.0"
  port: 8002
